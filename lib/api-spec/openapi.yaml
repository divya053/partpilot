openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: IK Part Number Portal API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: part-numbers
    description: Part number management
  - name: segments
    description: Segment value configuration
  - name: stats
    description: Dashboard statistics
  - name: import
    description: Bulk import operations
  - name: ai
    description: AI-assisted builder operations
  - name: auth
    description: Authentication and user management

paths:
  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Log in with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Log out the current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get the currently authenticated user (null if not logged in)
      responses:
        "200":
          description: Current session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthMeResponse"

  /auth/users:
    get:
      operationId: listUsers
      tags: [auth]
      summary: List all users (master only)
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createUser
      tags: [auth]
      summary: Create a user (master only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserInput"
      responses:
        "201":
          description: Created user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Username already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/users/{id}:
    patch:
      operationId: updateUser
      tags: [auth]
      summary: Update a user's role, name, or password (master only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteUser
      tags: [auth]
      summary: Delete a user (master only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /ai/model-defaults:
    get:
      operationId: getModelDefaults
      tags: [ai]
      summary: Most-common segment values for a product model, learned from existing parts
      parameters:
        - name: productModel
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deterministic field defaults derived from the registry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiModelDefaults"

  /ai/learning-status:
    get:
      operationId: getLearningStatus
      tags: [ai]
      summary: Self-learning model status — what the AI has learned from the registry so far
      responses:
        "200":
          description: Learning status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiLearningStatus"

  /ai/predict-next:
    post:
      operationId: predictNextFields
      tags: [ai]
      summary: Predict the most likely value for each unfilled segment, learned from matching parts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiPredictInput"
      responses:
        "200":
          description: Per-field predictions conditioned on the current draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiPredictResponse"

  /ai/insights:
    get:
      operationId: getAiInsights
      tags: [ai]
      summary: Data-driven insights and alerts for a given page scope
      parameters:
        - name: scope
          in: query
          required: true
          schema:
            type: string
            enum: [dashboard, builder, library, part, segments, global]
        - name: partId
          in: query
          required: false
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Insights and optional AI narrative for the requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiInsightsResponse"

  /ai/assistant:
    post:
      operationId: askAiAssistant
      tags: [ai]
      summary: Ask the data-aware AI assistant about the portal and registry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiAssistantInput"
      responses:
        "200":
          description: Assistant reply grounded in live registry data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiAssistantResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /ai/explain:
    post:
      operationId: explainPartNumber
      tags: [ai]
      summary: Explain a part number segment-by-segment in plain English
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiExplainInput"
      responses:
        "200":
          description: Human-readable breakdown of the part number
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiExplainResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Part number not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /part-numbers:
    get:
      operationId: listPartNumbers
      tags: [part-numbers]
      summary: List part numbers with search and filter
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 25 }
        - name: search
          in: query
          schema: { type: string }
        - name: category
          in: query
          schema: { type: string }
        - name: productModel
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [draft, active, deprecated] }
        - name: cct
          in: query
          schema: { type: string }
        - name: finish
          in: query
          schema: { type: string }
        - name: voltageRange
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated list of part numbers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartNumberList"
    post:
      operationId: createPartNumber
      tags: [part-numbers]
      summary: Create a new part number
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartNumberInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartNumber"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Part number already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /part-numbers/decode:
    post:
      operationId: decodePartNumber
      tags: [part-numbers]
      summary: Decode a raw part number string into its segments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecodeInput"
      responses:
        "200":
          description: Decoded segments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecodedPartNumber"
        "400":
          description: Invalid part number format
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /part-numbers/validate-builder:
    post:
      operationId: validateBuilderPartNumber
      tags: [part-numbers]
      summary: Validate a builder draft, detect duplicates, and suggest next values
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuilderValidationInput"
      responses:
        "200":
          description: Validation analysis for the current builder draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderValidationResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /part-numbers/recent:
    get:
      operationId: getRecentPartNumbers
      tags: [part-numbers]
      summary: Get the 10 most recently created or updated part numbers
      responses:
        "200":
          description: Recent part numbers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PartNumber"

  /part-numbers/{id}:
    get:
      operationId: getPartNumber
      tags: [part-numbers]
      summary: Get a single part number
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: Part number found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartNumber"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updatePartNumber
      tags: [part-numbers]
      summary: Update a part number
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartNumberUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartNumber"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deletePartNumber
      tags: [part-numbers]
      summary: Delete a part number
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /part-numbers/{id}/duplicate:
    post:
      operationId: duplicatePartNumber
      tags: [part-numbers]
      summary: Duplicate a part number as a new draft
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "201":
          description: Duplicated draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartNumber"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /segments:
    get:
      operationId: listSegments
      tags: [segments]
      summary: List all segment definitions with their allowed values
      responses:
        "200":
          description: All segment definitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SegmentDefinition"

  /segments/{key}:
    get:
      operationId: getSegment
      tags: [segments]
      summary: Get a single segment definition with its values
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Segment definition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentDefinition"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /segments/{key}/values:
    post:
      operationId: addSegmentValue
      tags: [segments]
      summary: Add a new allowed value to a segment
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentValueInput"
      responses:
        "201":
          description: Value added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentValue"
        "409":
          description: Code already exists in segment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /segments/{key}/values/{code}:
    patch:
      operationId: updateSegmentValue
      tags: [segments]
      summary: Update description or applicability of a segment value
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SegmentValueUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SegmentValue"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteSegmentValue
      tags: [segments]
      summary: Remove an allowed value from a segment
      parameters:
        - name: key
          in: path
          required: true
          schema: { type: string }
        - name: code
          in: path
          required: true
          schema: { type: string }
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getDashboardStats
      tags: [stats]
      summary: Get dashboard summary statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /stats/by-category:
    get:
      operationId: getStatsByCategory
      tags: [stats]
      summary: Get part number counts grouped by product category
      responses:
        "200":
          description: Counts by category
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryCount"

  /stats/by-model:
    get:
      operationId: getStatsByModel
      tags: [stats]
      summary: Get part number counts grouped by product model
      responses:
        "200":
          description: Counts by model
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelCount"

  /import:
    post:
      operationId: bulkImportPartNumbers
      tags: [import]
      summary: Bulk import part numbers from a JSON array
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkImportInput"
      responses:
        "200":
          description: Import result summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    OkResponse:
      type: object
      additionalProperties: false
      required:
        - ok
      properties:
        ok:
          type: boolean

    Role:
      type: string
      enum: [master, creator, viewer]

    AuthUser:
      type: object
      additionalProperties: false
      required:
        - id
        - username
        - displayName
        - role
      properties:
        id:
          type: integer
        username:
          type: string
        displayName:
          type: string
        role:
          $ref: "#/components/schemas/Role"

    AuthMeResponse:
      type: object
      additionalProperties: false
      required:
        - user
      properties:
        user:
          anyOf:
            - $ref: "#/components/schemas/AuthUser"
            - type: "null"

    LoginInput:
      type: object
      additionalProperties: false
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    CreateUserInput:
      type: object
      additionalProperties: false
      required:
        - username
        - displayName
        - password
        - role
      properties:
        username:
          type: string
          minLength: 1
        displayName:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 6
        role:
          $ref: "#/components/schemas/Role"

    UpdateUserInput:
      type: object
      additionalProperties: false
      properties:
        displayName:
          type: ["string", "null"]
        password:
          type: ["string", "null"]
        role:
          anyOf:
            - $ref: "#/components/schemas/Role"
            - type: "null"

    AiBuilderDraft:
      type: object
      additionalProperties: false
      properties:
        productCategory:
          type: ["string", "null"]
        productName:
          type: ["string", "null"]
        company:
          type: ["string", "null"]
        productModel:
          type: ["string", "null"]
        versionVariant:
          type: ["string", "null"]
        sizeVariant:
          type: ["string", "null"]
        powerType:
          type: ["string", "null"]
        maxPower:
          type: ["string", "null"]
        voltageRange:
          type: ["string", "null"]
        dimming:
          type: ["string", "null"]
        cct:
          type: ["string", "null"]
        lightDistribution:
          type: ["string", "null"]
        driver:
          type: ["string", "null"]
        finish:
          type: ["string", "null"]
        manufacturer:
          type: ["string", "null"]
        lensType:
          type: ["string", "null"]
        emergencyOption:
          type: ["string", "null"]
        sensorOption:
          type: ["string", "null"]
        surgeProtection:
          type: ["string", "null"]
        reflectorCover:
          type: ["string", "null"]
        mountingOption:
          type: ["string", "null"]
        photocontrolOption:
          type: ["string", "null"]
        connectableOption:
          type: ["string", "null"]
        base:
          type: ["string", "null"]

    AiModelDefaultField:
      type: object
      additionalProperties: false
      required:
        - field
        - label
        - code
        - description
        - share
        - count
      properties:
        field:
          type: string
        label:
          type: string
        code:
          type: string
        description:
          type: string
        share:
          type: integer
        count:
          type: integer

    AiModelDefaults:
      type: object
      additionalProperties: false
      required:
        - productModel
        - sampleSize
        - fields
      properties:
        productModel:
          type: string
        sampleSize:
          type: integer
        fields:
          type: array
          items:
            $ref: "#/components/schemas/AiModelDefaultField"

    AiLearningStatus:
      type: object
      additionalProperties: false
      required:
        - partsLearned
        - models
        - categories
        - conventions
        - segmentCoverage
        - lastLearnedAt
      properties:
        partsLearned:
          type: integer
        models:
          type: integer
        categories:
          type: integer
        conventions:
          type: integer
        segmentCoverage:
          type: integer
        lastLearnedAt:
          type: ["string", "null"]

    AiPredictInput:
      type: object
      additionalProperties: false
      required:
        - draft
      properties:
        draft:
          $ref: "#/components/schemas/AiBuilderDraft"

    AiPrediction:
      type: object
      additionalProperties: false
      required:
        - code
        - description
        - confidence
        - count
      properties:
        code:
          type: string
        description:
          type: string
        confidence:
          type: integer
        count:
          type: integer

    AiFieldPrediction:
      type: object
      additionalProperties: false
      required:
        - field
        - label
        - basisCount
        - candidates
      properties:
        field:
          type: string
        label:
          type: string
        basisCount:
          type: integer
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/AiPrediction"

    AiPredictResponse:
      type: object
      additionalProperties: false
      required:
        - basisCount
        - filledCount
        - predictions
      properties:
        basisCount:
          type: integer
        filledCount:
          type: integer
        predictions:
          type: array
          items:
            $ref: "#/components/schemas/AiFieldPrediction"

    AiInsight:
      type: object
      additionalProperties: false
      required:
        - id
        - scope
        - severity
        - title
        - message
        - actionLabel
        - actionHref
        - field
      properties:
        id:
          type: string
        scope:
          type: string
        severity:
          type: string
          enum: [info, suggestion, warning, critical]
        title:
          type: string
        message:
          type: string
        actionLabel:
          type: ["string", "null"]
        actionHref:
          type: ["string", "null"]
        field:
          type: ["string", "null"]
        items:
          type: ["array", "null"]
          items:
            type: object
            additionalProperties: false
            required:
              - label
            properties:
              label:
                type: string
              href:
                type: ["string", "null"]

    AiInsightsResponse:
      type: object
      additionalProperties: false
      required:
        - scope
        - aiConfigured
        - provider
        - narrative
        - insights
      properties:
        scope:
          type: string
        aiConfigured:
          type: boolean
        provider:
          type: string
        narrative:
          type: ["string", "null"]
        insights:
          type: array
          items:
            $ref: "#/components/schemas/AiInsight"

    AiChatMessage:
      type: object
      additionalProperties: false
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string

    AiAssistantInput:
      type: object
      additionalProperties: false
      required:
        - message
      properties:
        message:
          type: string
          minLength: 1
        scope:
          anyOf:
            - type: string
            - type: "null"
        history:
          type: array
          items:
