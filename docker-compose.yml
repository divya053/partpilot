# PartPilot — full stack: MySQL + API (Node) + Caddy (static + reverse proxy).
# Usage:  cp deploy/.env.example .env  &&  edit .env  &&  docker compose up -d --build
# Compose reads variables from the .env file in this directory.

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-partpilot}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3001"
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DATABASE:-partpilot}
      SESSION_SECRET: ${SESSION_SECRET}
      # AI provider (all optional — insights work without any key):
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "3001"
    # Lets the API reach a model server running on the VPS host (Ollama/LM Studio)
    # via AI_BASE_URL=http://host.docker.internal:11434/v1
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      target: web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  db_data:
  caddy_data:
  caddy_config:
