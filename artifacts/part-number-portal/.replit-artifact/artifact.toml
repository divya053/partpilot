kind = "web"
previewPath = "/"
title = "IK Part Number Portal"
version = "1.0.0"
id = "artifacts/part-number-portal"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18880

[services.development]
run = "pnpm --filter @workspace/part-number-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/part-number-portal", "run", "build" ]
serve = "static"
publicDir = "artifacts/part-number-portal/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18880"
BASE_PATH = "/"
