# PartPilot — SUBPATH deployment behind CloudPanel (nginx) on an existing domain.
#
# Serves the app at https://<your-domain>/partpilot/ . CloudPanel owns 80/443 and
# TLS; this stack (its own MySQL + API + Caddy) listens only on 127.0.0.1:8080 and
# CloudPanel reverse-proxies the /partpilot path to it.
#
#   cp deploy/.env.subpath.example .env      # set MYSQL_ROOT_PASSWORD, SESSION_SECRET, BASE_PATH
#   docker compose -f docker-compose.subpath.yml up -d --build
#   docker compose -f docker-compose.subpath.yml logs -f api   # wait for "Server listening"
#
# Then in CloudPanel add a reverse-proxy location for /partpilot -> 127.0.0.1:8080
# (see DEPLOY.md → "Deploying at a subpath behind CloudPanel").

services:
  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-partpilot}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      target: api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "3001"
      DATABASE_URL: mysql://root:${MYSQL_ROOT_PASSWORD}@db:3306/${MYSQL_DATABASE:-partpilot}
      SESSION_SECRET: ${SESSION_SECRET}
      # Scope the session cookie to the subpath (must match BASE_PATH).
      SESSION_COOKIE_PATH: ${BASE_PATH:-/partpilot}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
      AI_BASE_URL: ${AI_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    expose:
      - "3001"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  web:
    build:
      context: .
      target: web
      args:
        # Bakes the SPA base path (asset URLs, router basename, API prefix).
        VITE_BASE_PATH: ${BASE_PATH:-/partpilot}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      # Consumed by Caddyfile.subpath's {$BASE_PATH} placeholder.
      BASE_PATH: ${BASE_PATH:-/partpilot}
    volumes:
      - ./deploy/Caddyfile.subpath:/etc/caddy/Caddyfile:ro
    # Localhost only — CloudPanel's reverse proxy reaches it here.
    ports:
      - "127.0.0.1:8080:80"

volumes:
  db_data:
