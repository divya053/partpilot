# PartPilot — nginx location block for the /partpilot subpath.
#
# Paste these two blocks INSIDE the existing `server { ... }` block that serves
# ikiousa.tech (on this VPS that is /etc/nginx/sites-enabled/escotracker.conf,
# NOT CloudPanel's Vhost UI). Replace any old `location /partpilot { ... }` block
# that pointed at the Docker container (127.0.0.1:8080).
#
# The trailing slash on proxy_pass strips the /partpilot prefix, so the Node app
# serves assets at "/" and the API at "/api".

location = /partpilot { return 301 /partpilot/; }

location /partpilot/ {
    proxy_pass http://127.0.0.1:4100/;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
